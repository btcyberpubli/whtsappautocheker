<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Informe - Superbot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: white;
            --bg-tertiary: #f8f9fa;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --border-color: #e0e0e0;
            --shadow-light: rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-color: #444444;
            --shadow-light: rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-tertiary) 100%);
            padding: 8px;
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .timestamp {
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-weight: 500;
        }

        .section {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px var(--shadow-light);
            border-top: 3px solid #27ae60;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #27ae60;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        /* BUTTONS */
        .btn {
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(39, 174, 96, 0.3);
        }

        .btn-refresh:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(39, 174, 96, 0.4);
        }

        .btn-export {
            background: linear-gradient(135deg, #2980b9 0%, #2471a3 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(41, 128, 185, 0.3);
        }

        .btn-export:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(41, 128, 185, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, #8e44ad 0%, #714fa6 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(142, 68, 173, 0.3);
        }

        .btn-info:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(142, 68, 173, 0.4);
        }

        .btn-dark-mode {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            box-shadow: 0 4px 8px rgba(243, 156, 18, 0.3);
            font-size: 16px;
        }

        .btn-dark-mode:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(243, 156, 18, 0.4);
        }

        body.dark-mode .btn-dark-mode {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* PANELS LAYOUT */
        .panels-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-section {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 10px;
            align-items: flex-start;
            background: var(--bg-tertiary);
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid #27ae60;
        }

        .panel-info {
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 10px;
            background: var(--bg-secondary);
            box-shadow: 0 1px 3px var(--shadow-light);
        }

        .panel-info-header {
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text-primary);
            padding-bottom: 6px;
            border-bottom: 2px solid #27ae60;
        }

        .panel-info-row {
            display: flex;
            justify-content: flex-start;
            font-size: 12px;
            margin-bottom: 3px;
            padding: 2px 0;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .panel-info-label {
            color: var(--text-secondary);
            font-weight: 600;
            min-width: auto;
        }

        .panel-info-value {
            color: var(--text-primary);
            font-weight: 700;
            text-align: left;
            font-size: 13px;
        }

        .panel-info-row.sin-campania {
            background: #fff3cd;
            padding: 6px 8px;
            border-radius: 4px;
            margin-top: 8px;
            border-left: 3px solid #ffc107;
        }

        body.dark-mode .panel-info-row.sin-campania {
            background: #664d1a;
            color: #ffc107;
        }

        .panel-info-value.sin-campania {
            color: #cc7c00;
            font-size: 14px;
        }

        body.dark-mode .panel-info-value.sin-campania {
            color: #ffc107;
        }

        /* Dark Mode Styles */
        body.dark-mode .section {
            background: var(--bg-secondary);
            box-shadow: 0 2px 8px var(--shadow-light);
        }

        body.dark-mode .campaign-bar {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        body.dark-mode .campaign-bar.campaign-bar-paused {
            background: #4a4a4a !important;
            border-color: #555 !important;
        }

        body.dark-mode .campaign-bar.campaign-bar-paused .campaign-bar-name,
        body.dark-mode .campaign-bar.campaign-bar-paused .campaign-stat-label,
        body.dark-mode .campaign-bar.campaign-bar-paused .campaign-stat-value {
            color: #d0d0d0 !important;
        }

        body.dark-mode .campaign-stat-item.asignar-input {
            background: rgba(100, 150, 200, 0.15);
            border: 1px solid rgba(100, 150, 200, 0.3);
        }

        body.dark-mode .campaign-stat-item.asignar-input input {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        body.dark-mode .campaign-stat-item.asignar-input input:focus {
            border-color: #5dade2;
            box-shadow: 0 0 4px rgba(93, 173, 226, 0.3);
        }

        body.dark-mode .btn-asignar-add,
        body.dark-mode .btn-asignar-rest {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        body.dark-mode .btn-asignar-add:hover {
            background: #229954;
            color: white;
            border-color: #1e8449;
        }

        body.dark-mode .btn-asignar-rest:hover {
            background: #c0392b;
            color: white;
            border-color: #a93226;
        }

        body.dark-mode .input-objetivo {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        body.dark-mode .input-objetivo:focus {
            border-color: #5dade2;
            box-shadow: 0 0 4px rgba(93, 173, 226, 0.3);
        }

        body.dark-mode .btn-dark-mode {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
        }

        body.dark-mode .header-controls .timestamp {
            color: var(--text-secondary);
        }

        body.dark-mode input[type="checkbox"] {
            accent-color: #5dade2;
        }

        /* Dark Mode - Progress States */
        body.dark-mode .progreso-inicial {
            background: rgba(160, 89, 77, 0.25);
            color: #d9a09a;
            border-color: rgba(160, 89, 77, 0.3);
        }

        body.dark-mode .progreso-bajo {
            background: rgba(184, 112, 74, 0.25);
            color: #e8b896;
            border-color: rgba(184, 112, 74, 0.3);
        }

        body.dark-mode .progreso-medio {
            background: rgba(201, 169, 97, 0.25);
            color: #f5d986;
            border-color: rgba(201, 169, 97, 0.3);
        }

        body.dark-mode .progreso-alto {
            background: rgba(107, 157, 123, 0.25);
            color: #9ecaa8;
            border-color: rgba(107, 157, 123, 0.3);
        }

        body.dark-mode .progreso-completo {
            background: rgba(90, 138, 106, 0.3);
            color: #8db89e;
            border-color: rgba(90, 138, 106, 0.35);
        }

        body.dark-mode .saldos-table thead {
            background: linear-gradient(135deg, #3d4a53 0%, #2d3842 100%);
        }

        body.dark-mode .saldos-table tbody tr:hover {
            background: var(--bg-tertiary);
        }

        body.dark-mode .saldos-table tbody td {
            color: var(--text-primary);
        }

        body.dark-mode .alerta-sin-campania {
            background: linear-gradient(135deg, #a93226 0%, #78260d 100%);
            border-left-color: #c0392b;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.15);
        }

        /* ===== ALERTAS WHATSAPP ===== */
        .whatsapp-alerts-container {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px var(--shadow-light);
            border-top: 3px solid #e74c3c;
        }

        .whatsapp-alerts-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e74c3c;
            color: var(--text-primary);
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .whatsapp-alerts-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            font-weight: 700;
        }

        .whatsapp-alert-item {
            background: linear-gradient(135deg, #fadbd8 0%, #f5b7b1 100%);
            border: 1px solid #e74c3c;
            border-left: 4px solid #c0392b;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(231, 76, 60, 0.1);
        }

        body.dark-mode .whatsapp-alert-item {
            background: linear-gradient(135deg, #5d4037 0%, #3e2723 100%);
            border-color: #d32f2f;
        }

        .whatsapp-alert-content {
            flex: 1;
        }

        .whatsapp-alert-contact {
            font-weight: 700;
            color: #c0392b;
            font-size: 13px;
            margin-bottom: 3px;
        }

        body.dark-mode .whatsapp-alert-contact {
            color: #ef5350;
        }

        .whatsapp-alert-message {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 3px;
            font-style: italic;
        }

        .whatsapp-alert-time {
            font-size: 10px;
            color: #7f8c8d;
        }

        body.dark-mode .whatsapp-alert-time {
            color: #9e9e9e;
        }

        .whatsapp-alert-actions {
            display: flex;
            gap: 5px;
            margin-left: 10px;
        }

        .btn-resolve-alert {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-resolve-alert:hover {
            background: #229954;
            transform: translateY(-1px);
        }

        .whatsapp-no-alerts {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .asignaciones-list {
            margin-top: 3px;
            padding: 2px 0;
        }

        .asignacion-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 3px;
            padding: 4px 3px;
            font-size: 10px;
            color: #27ae60;
            border-bottom: 1px solid var(--border-color);
        }

        .asignacion-item:last-child {
            border-bottom: none;
        }

        .asignacion-campania {
            min-width: 45px;
            font-weight: 600;
        }

        .asignacion-botones-compactos {
            display: flex;
            gap: 3px;
        }

        .btn-agregar-uno,
        .btn-restar-uno {
            padding: 3px 6px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 3px;
            background: #ecf0f1;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 28px;
            color: #2c3e50;
        }

        .btn-agregar-uno:hover:not(:disabled) {
            background: #27ae60;
            color: white;
            border-color: #229954;
        }

        .btn-restar-uno:hover:not(:disabled) {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .btn-agregar-uno:disabled,
        .btn-restar-uno:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #bdc3c7;
            color: #7f8c8d;
        }

        /* Input delta (para sumar varios de una vez) */
        .asignacion-input-delta {
            display: flex;
            gap: 2px;
            align-items: center;
            order: -1;  /* Aparece primero */
        }

        .asignacion-input-delta input {
            width: 50px;
            padding: 4px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 2px;
            text-align: center;
            color: #2c3e50;
            background: #fff;
            font-weight: bold;
        }

        .asignacion-input-delta input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 4px rgba(52, 152, 219, 0.3);
        }

        .btn-input-menos,
        .btn-input-mas {
            padding: 3px 6px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #3498db;
            border-radius: 2px;
            background: #3498db;
            color: white;
            cursor: pointer;
            min-width: 28px;
            transition: all 0.15s ease;
        }

        .btn-input-menos:hover,
        .btn-input-mas:hover {
            background: #2980b9;
            border-color: #1f618d;
        }

        .btn-input-menos:disabled,
        .btn-input-mas:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #bdc3c7;
            border-color: #95a5a6;
        }

        /* Botón guardar todo */
        .asignaciones-footer {
            padding: 5px 3px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
        }

        .btn-guardar-todo {
            padding: 5px 10px;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid #27ae60;
            border-radius: 4px;
            background: #27ae60;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-guardar-todo:hover {
            background: #229954;
            border-color: #1e8449;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.3);
        }

        /* Dark mode adjustments */
        body.dark-mode .asignacion-input-delta input {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        body.dark-mode .btn-input-menos,
        body.dark-mode .btn-input-mas {
            background: #3498db;
            border-color: #2980b9;
        }

        body.dark-mode .btn-input-menos:hover,
        body.dark-mode .btn-input-mas:hover {
            background: #2980b9;
            border-color: #1f618d;
        }

        body.dark-mode .btn-input-menos:disabled,
        body.dark-mode .btn-input-mas:disabled {
            background: #444;
            color: #888;
            opacity: 0.5;
        }

        body.dark-mode .btn-agregar-uno,
        body.dark-mode .btn-restar-uno {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        body.dark-mode .btn-agregar-uno:hover:not(:disabled) {
            background: #229954;
            color: white;
            border-color: #1e8449;
        }

        body.dark-mode .btn-restar-uno:hover:not(:disabled) {
            background: #c0392b;
            color: white;
            border-color: #a93226;
        }

        body.dark-mode .btn-agregar-uno:disabled,
        body.dark-mode .btn-restar-uno:disabled {
            background: #444;
            color: #888;
            opacity: 0.5;
        }

        body.dark-mode .btn-guardar-todo {
            background: #27ae60;
            border-color: #229954;
        }

        body.dark-mode .btn-guardar-todo:hover {
            background: #229954;
            border-color: #1e8449;
        }

        body.dark-mode .asignacion-auto {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-left: auto;
        }

        .asignacion-auto input[type="checkbox"] {
            cursor: pointer;
            width: 12px;
            height: 12px;
        }

        .asignacion-auto label {
            font-size: 9px;
            color: var(--text-secondary);
            cursor: pointer;
            margin: 0;
        }

        .campaigns-list {
            display: flex;
            flex-direction: column;
            gap: 0px;
            align-items: flex-end;
        }

        .campaign-bar {
            background: var(--bg-secondary);
            padding: 1px 3px;
            border-radius: 2px;
            color: var(--text-primary);
            font-size: 11px;
            font-weight: 500;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: nowrap;
            gap: 2px;
            border: 2px solid var(--border-color);
            transition: all 0.2s ease;
            margin-bottom: 0px;
            width: 100%;
        }

        /* FONDOS SUAVES POR RANGO DE PRECIO */
        .campaign-bar.campania-fondo-verde {
            background: #b3ead5;
            border-color: #27ae60;
        }

        .campaign-bar.campania-fondo-amarillo {
            background: #fffacc;
            border-color: #f1c40f;
        }

        .campaign-bar.campania-fondo-naranja {
            background: #ffdab0;
            border-color: #e67e22;
        }

        .campaign-bar.campania-fondo-rojo {
            background: #ffb8b8;
            border-color: #e74c3c;
        }

        /* COLORES APAGADOS PARA LOS CUADRADITOS DE PRECIO EN PAUSADAS */
        .campaign-bar.campaign-bar-paused .precio-verde {
            background: #b8d9c9 !important;
            color: #5a8a6a !important;
            box-shadow: none !important;
        }

        .campaign-bar.campaign-bar-paused .precio-verde .campaign-stat-value {
            color: #5a8a6a !important;
        }

        .campaign-bar.campaign-bar-paused .precio-amarillo {
            background: #ddd4b8 !important;
            color: #9d8a5a !important;
            box-shadow: none !important;
        }

        .campaign-bar.campaign-bar-paused .precio-amarillo .campaign-stat-value {
            color: #9d8a5a !important;
        }

        .campaign-bar.campaign-bar-paused .precio-naranja {
            background: #d9c9b0 !important;
            color: #a67a4a !important;
            box-shadow: none !important;
        }

        .campaign-bar.campaign-bar-paused .precio-naranja .campaign-stat-value {
            color: #a67a4a !important;
        }

        .campaign-bar.campaign-bar-paused .precio-rojo {
            background: #d9b8b0 !important;
            color: #a25a52 !important;
            box-shadow: none !important;
        }

        .campaign-bar.campaign-bar-paused .precio-rojo .campaign-stat-value {
            color: #a25a52 !important;
        }

        .campaign-bar:hover {
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        /* CAMPAÑA PAUSADA - ESTILO GRIS */
        .campaign-bar.campaign-bar-paused {
            background: #d0d0d0 !important;
            border-color: #95a5a6 !important;
        }

        .campaign-bar.campaign-bar-paused .campaign-bar-name,
        .campaign-bar.campaign-bar-paused .campaign-stat-label,
        .campaign-bar.campaign-bar-paused .campaign-stat-value {
            color: #2c3e50 !important;
        }

        .campaign-bar-name {
            min-width: auto;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 15px;
            order: -1;  /* Aparece primero */
            width: auto;
            margin-bottom: 0;
            text-align: left;
            margin-right: 4px;
        }

        .campaign-bar-stats {
            display: flex;
            gap: 1px;
            align-items: center;
            font-size: 11px;
        }

        .campaign-stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            padding: 0px 2px;
            border-radius: 2px;
            background: transparent;
        }

        .campaign-stat-item.asignar-input {
            flex-direction: row;
            gap: 2px;
            padding: 2px;
            background: rgba(41, 128, 185, 0.08);
            border-radius: 2px;
            border: 1px solid rgba(41, 128, 185, 0.2);
        }

        .campaign-stat-item.asignar-input input {
            width: 35px;
            padding: 3px;
            font-size: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 2px;
        }

        .campaign-stat-item.asignar-input input:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 4px rgba(41, 128, 185, 0.3);
        }

        .asignar-controles {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .input-asignar-mensaje {
            flex: 1;
            max-width: 50px;
        }

        .asignar-botones-vertical {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .btn-asignar-add,
        .btn-asignar-rest {
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #bdc3c7;
            border-radius: 2px;
            background: #ecf0f1;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 28px;
            color: #2c3e50;
            line-height: 1;
        }

        .btn-asignar-add:hover {
            background: #27ae60;
            color: white;
            border-color: #229954;
        }

        .btn-asignar-rest:hover {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .btn-asignar-add:active,
        .btn-asignar-rest:active {
            transform: scale(0.95);
        }

        .checkbox-asignacion-auto {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #27ae60;
        }

        .asignacion-auto-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            color: var(--text-secondary);
            cursor: pointer;
            margin: 0;
        }

        /* ESTILOS PARA DESPLEGABLES */
        .collapse-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 12px;
            color: #5dade2;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }

        .collapse-toggle:hover {
            color: #3d9be8;
        }

        .collapse-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .collapse-content.collapsed {
            max-height: 0;
        }

        .asignaciones-list-compact {
            margin-top: 4px;
            padding: 6px 0;
            font-size: 11px;
        }

        .adsets-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 6px;
            transition: all 0.2s ease;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 3px;
        }

        .adsets-toggle:hover {
            color: #5dade2;
            background: rgba(93, 173, 226, 0.1);
        }

        .campaign-adsets-container {
            margin-top: -1px;
            margin-left: 0;
            border-left: none;
            padding-left: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 4px 4px;
        }

        .campaign-adsets-container.collapsed {
            display: none;
        }

        .campaign-stat-label {
            color: var(--text-secondary);
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .campaign-stat-value {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 10px;
        }

        /* CLY con brillo sutil de fondo */
        .campaign-bar-stats .campaign-stat-item:nth-child(3) .campaign-stat-label {
            color: var(--text-primary);
            font-weight: 800;
        }

        .campaign-bar-stats .campaign-stat-item:nth-child(3) .campaign-stat-value {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 3px;
            display: inline-block;
        }

        /* CARGAS con estilo similar a CLY */
        .campaign-bar-stats .campaign-stat-item:nth-child(5) .campaign-stat-label {
            color: var(--text-primary);
            font-weight: 800;
        }

        .campaign-bar-stats .campaign-stat-item:nth-child(5) .campaign-stat-value {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* SISTEMA DE COLORES POR RANGO DE PRECIO CPM */
        .precio-verde {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%) !important;
            color: white !important;
            padding: 4px 8px !important;
            border-radius: 3px;
            font-weight: 700 !important;
            box-shadow: 0 2px 4px rgba(39, 174, 96, 0.3);
        }

        .precio-verde .campaign-stat-label {
            color: rgba(255,255,255,0.9) !important;
            font-size: 9px !important;
        }

        .precio-verde .campaign-stat-value {
            color: white !important;
            font-size: 12px !important;
        }

        .precio-amarillo {
            background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%) !important;
            color: #2c3e50 !important;
            padding: 4px 8px !important;
            border-radius: 3px;
            font-weight: 700 !important;
            box-shadow: 0 2px 4px rgba(241, 196, 15, 0.3);
        }

        .precio-amarillo .campaign-stat-label {
            color: #2c3e50 !important;
            font-size: 9px !important;
        }

        .precio-amarillo .campaign-stat-value {
            color: #2c3e50 !important;
            font-size: 12px !important;
        }

        .precio-naranja {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%) !important;
            color: white !important;
            padding: 4px 8px !important;
            border-radius: 3px;
            font-weight: 700 !important;
            box-shadow: 0 2px 4px rgba(243, 156, 18, 0.3);
        }

        .precio-naranja .campaign-stat-label {
            color: rgba(255,255,255,0.9) !important;
            font-size: 9px !important;
        }

        .precio-naranja .campaign-stat-value {
            color: white !important;
            font-size: 12px !important;
        }

        .precio-rojo {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%) !important;
            color: white !important;
            padding: 4px 8px !important;
            border-radius: 3px;
            font-weight: 700 !important;
            box-shadow: 0 2px 4px rgba(231, 76, 60, 0.3);
        }

        .precio-rojo .campaign-stat-label {
            color: rgba(255,255,255,0.9) !important;
            font-size: 9px !important;
        }

        .precio-rojo .campaign-stat-value {
            color: white !important;
            font-size: 12px !important;
        }

        /* ✅ TOTALES CLY CON PROGRESO VISUAL */
        .totales-cargas {
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 700;
            text-align: right;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .totales-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .totales-valor {
            font-size: 20px;
            font-weight: 800;
            display: inline-block;
        }

        .totales-porcentaje {
            font-size: 12px;
            opacity: 0.8;
            margin-left: 2px;
        }

        /* Estados de progreso - colores suaves pastel */
        .progreso-inicial {
            background: rgba(245, 220, 220, 0.4);
            color: #a0594d;
            border-color: rgba(200, 150, 150, 0.3);
        }

        .progreso-bajo {
            background: rgba(255, 230, 210, 0.4);
            color: #b8704a;
            border-color: rgba(210, 180, 160, 0.3);
        }

        .progreso-medio {
            background: rgba(255, 250, 200, 0.4);
            color: #c9a961;
            border-color: rgba(220, 210, 140, 0.3);
        }

        .progreso-alto {
            background: rgba(220, 240, 220, 0.4);
            color: #6b9d7b;
            border-color: rgba(170, 200, 170, 0.3);
        }

        .progreso-completo {
            background: rgba(200, 230, 210, 0.5);
            color: #5a8a6a;
            border-color: rgba(150, 190, 160, 0.4);
            animation: pulso-exito 0.6s ease-in-out;
        }

        @keyframes pulso-exito {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* SALDOS TABLE */
        .saldos-section {
            margin-top: 20px;
        }

        .saldos-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            table-layout: fixed;
        }

        .saldos-table thead {
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            color: white;
        }

        .saldos-table thead th {
            padding: 10px;
            text-align: left;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 2px solid #27ae60;
        }

        .saldos-table thead th:first-child {
            width: 60%;
        }

        .saldos-table thead th:last-child {
            width: 40%;
            text-align: right;
            padding-right: 20px;
        }

        .saldos-table tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .saldos-table tbody tr:hover {
            background: var(--bg-tertiary);
        }

        .saldos-table td {
            padding: 10px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 12px;
        }

        .saldos-table .panel-name {
            font-weight: 700;
            color: #27ae60;
        }

        .saldos-table .usuario-name {
            font-weight: 600;
            width: 60%;
        }

        .saldos-table .saldo-cell {
            text-align: right;
            font-weight: 700;
            color: #27ae60;
            font-size: 13px;
            padding-right: 20px;
            width: 40%;
        }

        .saldos-table .total-row {
            background: linear-gradient(135deg, #36b8c5 0%, #2c9cae 100%);
            color: white;
            font-weight: 700;
            font-size: 13px;
        }

        .saldos-table .total-row td {
            padding: 12px 10px;
            color: #FFFF00;
            font-weight: 700;
        }

        .saldos-table .total-row td:first-child {
            width: 60%;
        }

        .saldos-table .total-row td:last-child {
            text-align: right;
            padding-right: 20px;
            width: 40%;
        }

        .saldos-table .alerta-rojo {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white !important;
            font-weight: 700 !important;
        }

        .saldos-table .alerta-rojo td {
            color: white !important;
            font-weight: 700 !important;
        }

        /* MODAL CREATIVO */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px var(--shadow-light);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close-btn:hover {
            color: var(--text-primary);
        }

        .modal-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 16px;
            max-height: 400px;
            object-fit: contain;
        }

        .modal-info {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .modal-info-row {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .modal-info-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* BOTÓN VER CREATIVO */
        .btn-creativo {
            background: transparent;
            color: #9b59b6;
            border: 1px solid #9b59b6;
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 8px;
            font-weight: 500;
            text-transform: uppercase;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        .btn-creativo:hover {
            background: rgba(155, 89, 182, 0.1);
            box-shadow: none;
            transform: none;
        }

        .btn-creativo:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .estado-activo {
            color: #27ae60;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 9px;
            background: #d5f4e6;
            padding: 3px 6px;
            border-radius: 3px;
            letter-spacing: 0.2px;
            display: inline-block;
        }

        .estado-pausado {
            color: #c0392b;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 9px;
            background: #fadbd8;
            padding: 3px 6px;
            border-radius: 3px;
            letter-spacing: 0.2px;
            display: inline-block;
        }

        .timestamp-box {
            background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-primary);
            border-left: 4px solid #27ae60;
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .panel-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .header h1 {
                font-size: 24px;
            }

            .header-controls {
                width: 100%;
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .section {
                padding: 20px;
            }

            .campaign-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .campaign-bar-stats {
                flex-wrap: wrap;
                width: 100%;
                gap: 12px;
            }

            .campaign-stat-item {
                flex: 1;
                min-width: 80px;
            }

            .saldos-table {
                font-size: 12px;
            }

            .saldos-table th,
            .saldos-table td {
                padding: 12px;
            }
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .error {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 12px 14px;
            border-radius: 6px;
            margin: 10px 0;
            font-weight: 600;
            font-size: 12px;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
        }

        .error ul {
            margin-top: 8px;
            margin-left: 16px;
            font-size: 11px;
        }

        .error li {
            margin: 3px 0;
        }

        .success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 12px;
            display: none;
        }

        .success.show {
            display: block;
        }

        /* ALERTA DE SIN CAMPAÑA */
        .alerta-sin-campania {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 8px 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-weight: 600;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.2);
            border-left: 3px solid #a93226;
        }

        .alerta-icono {
            font-size: 14px;
        }

        .alerta-texto {
            flex: 1;
        }

        /* ESTILOS PARA ASIGNACIÓN DE MENSAJES */
        .asignacion-section {
            background: rgba(93, 173, 226, 0.1);
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid #5dade2;
            margin-top: 12px;
        }

        .asignacion-title {
            font-weight: 700;
            color: #5dade2;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .sin-campania-info {
            background: var(--bg-secondary);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
            border-left: 3px solid #e74c3c;
            color: var(--text-primary);
        }

        .sin-campania-count {
            font-weight: 700;
            color: #e74c3c;
            font-size: 14px;
        }

        .campania-form {
            background: var(--bg-secondary);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: grid;
            grid-template-columns: 60px 1fr 90px;
            gap: 8px;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .campania-label {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 12px;
        }

        .campania-input {
            padding: 5px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 11px;
            width: 70px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .campania-auto {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .campania-auto input[type="checkbox"] {
            cursor: pointer;
        }

        .campania-auto label {
            font-size: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            margin: 0;
        }

        .btn-guardar-asignaciones {
            background: linear-gradient(135deg, #2980b9 0%, #2471a3 100%);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 8px;
        }

        .btn-guardar-asignaciones:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(41, 128, 185, 0.4);
            transform: translateY(-2px);
        }

        .btn-guardar-asignaciones:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-guardar-asignaciones-panel {
            background: none;
            border: none;
            color: #5dade2;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            transition: all 0.2s ease;
            margin-top: 6px;
            width: 100%;
            text-align: center;
        }

        .btn-guardar-asignaciones-panel:hover {
            background: rgba(93, 173, 226, 0.1);
            color: #7ec8f0;
        }

        .btn-guardar-asignaciones-panel:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== ESTILOS PARA ADSETS (SUB-FILAS) ===== */
        .campaign-adset-row {
            background: var(--bg-secondary);
            padding: 6px 8px;
            margin-bottom: 3px;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-size: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            transition: all 0.15s ease;
        }

        .campaign-adset-row:first-child {
            margin-top: 8px;
        }

        .campaign-adset-row:last-child {
            margin-bottom: 8px;
        }

        .campaign-adset-row:hover {
            background: var(--bg-secondary);
            border-color: var(--text-secondary);
            box-shadow: 0 1px 3px var(--shadow-light);
        }

        .adset-name {
            flex: 1;
            min-width: 150px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 10px;
        }

        .adset-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            padding: 2px 4px;
            font-size: 9px;
        }

        .adset-stat-label {
            color: #95a5a6;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .adset-stat-value {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 10px;
        }

        .adset-status {
            padding: 2px 5px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .adset-status.active {
            background: #d5f4e6;
            color: #27ae60;
        }

        .adset-status.paused {
            background: #fdebd0;
            color: #e67e22;
        }

        @media print {
            body {
                background: white;
            }
            .header-controls,
            .btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>INFORME V3</h1>
            </div>
            <div class="header-controls">
                <div class="timestamp" id="timestamp">Cargando...</div>
                <button class="btn btn-refresh" id="refreshBtn" onclick="cargarDatos()">🔄 Actualizar</button>
                <button class="btn btn-export" id="exportBtn" onclick="exportarPNG()">📥 Descargar PNG</button>
                <button class="btn btn-info" onclick="window.open('https://informaciongeneral.vercel.app/', '_blank')">📈 Informe General</button>
                <button class="btn btn-info" onclick="window.open('https://buscadoretiquetas.vercel.app/', '_blank')">🏷️ Buscador Etiquetas</button>
                <button class="btn btn-dark-mode" id="darkModeBtn" onclick="toggleDarkMode()" title="Modo Oscuro">🌙</button>
            </div>
        </div>

        <div id="successMsg" class="success"></div>
        <div id="timestampBox" class="timestamp-box" style="display: none;"></div>

        <!-- ✅ NUEVO: Sección de Alertas WhatsApp -->
        <div id="whatsappAlertsSection" class="whatsapp-alerts-container" style="display: none;">
            <div class="whatsapp-alerts-title">
                📱 Alertas WhatsApp
                <span class="whatsapp-alerts-badge" id="alertsCount">0</span>
            </div>
            <div id="whatsappAlertsList"></div>
        </div>

        <div id="content">
            <div class="loading">⏳ Cargando datos...</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            ENDPOINT: "https://accountant-services.co.uk/root/superbot1.0",
            API_KEY: "clave-super-secreta",
            REFRESH_INTERVAL: 180000
        };

        let datosGlobales = {};
        let ultimaActualizacion = null;
        let autoRefreshId = null;

        // ========== FUNCIONES AUXILIARES ==========

        function formatearMoneda(valor) {
            return new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'ARS',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(valor);
        }

        function normalizarNombre(nombre) {
            if (!nombre) return '';
            return nombre
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '');
        }

        function validarDatosVPS(data) {
            if (!data.success) {
                throw new Error("❌ Respuesta con success = false");
            }
            if (!data.reportePaneles || !Array.isArray(data.reportePaneles)) {
                throw new Error("❌ reportePaneles ausente o inválido");
            }
            if (!data.campaniasMetaAds || !data.campaniasMetaAds.datos) {
                throw new Error("❌ campaniasMetaAds.datos ausente");
            }
            if (!data.horariosMetaAds) {
                throw new Error("❌ horariosMetaAds ausente");
            }
            return true;
        }

        function obtenerSaldosRestantes(campaniasMetaAds) {
            const saldosRestantes = {};
            const usuarios = campaniasMetaAds.datos || [];

            usuarios.forEach(usuario => {
                const nombreDueño = normalizarNombre(usuario.nombre);
                saldosRestantes[nombreDueño] = 0;

                if (Array.isArray(usuario.cuentas)) {
                    usuario.cuentas.forEach(cuenta => {
                        const spendCap = parseFloat(cuenta.saldos?.spend_cap) || 0;
                        const amountSpent = parseFloat(cuenta.saldos?.amount_spent) || 0;
                        saldosRestantes[nombreDueño] += (spendCap - amountSpent) / 100;
                    });
                }
            });

            return saldosRestantes;
        }

        async function cargarDatos() {
            const contentDiv = document.getElementById('content');
            const refreshBtn = document.getElementById('refreshBtn');
            
            if (refreshBtn) refreshBtn.disabled = true;

            try {
                contentDiv.innerHTML = '<div class="loading">⏳ Conectando con servidor...</div>';
                
                let datos = await fetchDesdeVPS();
                
                datosGlobales = datos;
                ultimaActualizacion = new Date();
                
                renderizarDashboard();
                mostrarUltimaActualizacion();
                iniciarAutoRefresh();
                
                // ✅ NUEVO: Cargar alertas de WhatsApp después de renderizar dashboard
                cargarAlertasWhatsApp();
                
            } catch (error) {
                console.error('Error:', error);
                
                contentDiv.innerHTML = 
                    `<div class="error">
                        <strong>❌ ERROR DE CONEXIÓN CON EL SERVIDOR</strong><br><br>
                        <strong>Endpoint:</strong> ${CONFIG.ENDPOINT}<br>
                        <strong>Motivo:</strong> ${error.message}<br><br>
                        <small>Verifica:</small>
                        <ul>
                            <li>Que el servidor VPS esté disponible</li>
                            <li>La URL del endpoint</li>
                            <li>La conectividad de red</li>
                        </ul>
                        <button class="btn btn-refresh" onclick="cargarDatos()" style="margin-top: 15px;">🔄 Reintentar</button>
                    </div>`;
            } finally {
                if (refreshBtn) refreshBtn.disabled = false;
            }
        }

        async function fetchDesdeVPS() {
            const options = {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            const response = await fetch(CONFIG.ENDPOINT, options);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const datos = await response.json();
            validarDatosVPS(datos);
            
            // 🔍 DEBUG: Ver qué trae de _config
            console.log('📦 Datos cargados del servidor:', datos);
            console.log('⚙️ _config:', datos._config);
            console.log('📋 Paneles en config:', Object.keys(datos._config?.paneles || {}));
            
            return datos;
        }

        function mostrarUltimaActualizacion() {
            const box = document.getElementById('timestampBox');
            if (!box) return;

            const formato = new Intl.DateTimeFormat('es-AR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            box.textContent = `🕒 Última actualización: ${formato.format(ultimaActualizacion)}`;
            box.style.display = 'block';
        }

        function iniciarAutoRefresh() {
            if (autoRefreshId) clearInterval(autoRefreshId);
            
            autoRefreshId = setInterval(() => {
                console.log('Auto-refresh...');
                cargarDatos();
            }, CONFIG.REFRESH_INTERVAL);
        }

        function renderizarDashboard() {
            const timestamp = datosGlobales.horariosMetaAds?.inicio || 
                            new Date().toLocaleString('es-AR');
            document.getElementById('timestamp').textContent = `Fecha: ${timestamp}`;

            let html = '';
            html += renderizarInformePaneles();
            html += renderizarTablaSaldos();

            document.getElementById('content').innerHTML = html;
            
            // ✅ NUEVO: Agregar event listeners para Enter en inputs de asignación

            // ✅ Event delegation para botones de resetear asignaciones (funciona con elementos dinámicos)
            document.addEventListener('click', async (e) => {
                const btn = e.target.closest('.btn-resetear-asignacion');
                if (!btn) return;
                
                e.preventDefault();
                const panelId = btn.getAttribute('data-panel-id');
                const letra = btn.getAttribute('data-campania');
                
                // Obtener el nombre del panel desde el header
                const panelDiv = document.querySelector(`[data-panel-id="${panelId}"]`);
                const headerText = panelDiv?.querySelector('.panel-info-header')?.textContent || '';
                const panelMatch = headerText.match(/▶\s+(\w+)\s+CODIGO/);
                const panelName = panelMatch ? panelMatch[1].toLowerCase() : 'unknown';
                
                // Confirmar antes de resetear
                if (!confirm(`¿Resetear asignaciones de ${letra} a 0?`)) {
                    return;
                }
                
                try {
                    const response = await fetch('https://accountant-services.co.uk/api/panel-asignaciones', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            panel_id: panelId,
                            panel_nombre: panelName,
                            campania: letra,
                            cantidad_asignada: 0,
                            asignacion_automatica: false
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success) {
                            console.log(`✅ Asignación reseteada: ${letra} = 0`);
                            // Recargar datos
                            setTimeout(() => cargarDatos(), 500);
                        }
                    } else {
                        console.error(`❌ Error 400: Revisar payload`);
                        alert('Error al resetear. Verifica la consola.');
                    }
                } catch (error) {
                    console.error('❌ Error al resetear asignación:', error);
                }
            });

            // ✅ Botones +/- del input delta (suman/restan directamente)
            document.addEventListener('click', async (e) => {
                const btn = e.target.closest('.btn-input-mas');
                if (!btn || btn.disabled) return;
                
                e.preventDefault();
                const panelId = btn.getAttribute('data-panel-id');
                const letra = btn.getAttribute('data-campania');
                const item = btn.closest('.asignacion-item');
                const input = item?.querySelector('.input-delta');
                const deltaValue = parseInt(input?.value) || 1;  // Si está vacío, suma 1
                
                // Obtener el nombre del panel
                const panelDiv = document.querySelector(`[data-panel-id="${panelId}"]`);
                const headerText = panelDiv?.querySelector('.panel-info-header')?.textContent || '';
                const panelMatch = headerText.match(/▶\s+(\w+)\s+CODIGO/);
                const panelName = panelMatch ? panelMatch[1].toLowerCase() : 'unknown';
                
                try {
                    // ✅ LÓGICA CORREGIDA: Usar reporte ORIGINAL para calcular espacio
                    // El reporte original tiene el SIN_CAMPAÑA de verdad
                    const panelEnReporteOriginal = datosGlobales.reportePanelesOriginal?.find(p => p.id === panelId) || 
                                                   datosGlobales.reportePaneles?.find(p => p.id === panelId);
                    const sinCampanaOriginal = panelEnReporteOriginal?.campañas?.SIN_CAMPAÑA?.mensajes || 0;
                    
                    // ✅ Calcular total asignado desde CONFIG (lo que el usuario asignó manualmente)
                    const totalAsignado = Object.values(datosGlobales._config?.paneles?.[panelName]?.campañas || {})
                        .reduce((sum, c) => sum + (c.cantidad_asignada || 0), 0);
                    
                    const cantidadActual = datosGlobales._config?.paneles?.[panelName]?.campañas?.[letra]?.cantidad_asignada || 0;
                    
                    // ✅ FUENTE DE VERDAD: Espacio disponible = SIN_CAMPAÑA original - total asignado
                    const espacioLibre = sinCampanaOriginal - totalAsignado;
                    
                    console.log(`\n📊 VALIDACIÓN - DATOS CORRECTOS:
                      • Panel ${panelName} ID: ${panelId}
                      • SIN_CAMPAÑA ORIGINAL (del reporte2): ${sinCampanaOriginal}
                      • Total ASIGNADO (config): ${totalAsignado}
                      • Espacio libre: ${espacioLibre}
                      • Asignado en ${letra}: ${cantidadActual}
                      • Intentando: +${deltaValue}`);
                    
                    // ✅ PASO 1: Verificar si hay sobreasignación
                    if (totalAsignado > sinCampanaOriginal) {
                        const exceso = totalAsignado - sinCampanaOriginal;
                        console.error(`❌ SOBREASIGNACIÓN: Config dice asignados ${totalAsignado} pero reporte original muestra SIN_CAMPAÑA ${sinCampanaOriginal} (Exceso: ${exceso})`);
                        alert(`❌ SOBREASIGNACIÓN DETECTADA\n\n📋 Del reporte ORIGINAL:\n• SIN_CAMPAÑA: ${sinCampanaOriginal}\n• Total asignado (config): ${totalAsignado}\n• Exceso: ${exceso}\n\n⚠️ Necesitas RESTAR para liberar espacio primero`);
                        return;
                    }
                    
                    // ✅ PASO 2: Verificar si hay espacio para agregar deltaValue
                    if (deltaValue > espacioLibre) {
                        console.warn(`⚠️ Espacio insuficiente. Original=${sinCampanaOriginal}, asignados=${totalAsignado}, libre=${espacioLibre}, intentas=+${deltaValue}`);
                        alert(`❌ NO HAY ESPACIO\n\n📋 Del reporte ORIGINAL:\n• SIN_CAMPAÑA disponibles: ${sinCampanaOriginal}\n• Total asignado: ${totalAsignado}\n• Espacio libre: ${espacioLibre}\n• Intentas asignar: +${deltaValue}\n\nNecesitas liberar ${deltaValue - espacioLibre} más`);
                        return;
                    }
                    
                    const nuevaCantidad = cantidadActual + deltaValue;
                    
                    console.log(`✅ Enviando POST: campania=${letra}, nuevaCantidad=${nuevaCantidad}`);
                    
                    const response = await fetch('https://accountant-services.co.uk/api/panel-asignaciones', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            panel_id: panelId,
                            panel_nombre: panelName,
                            campania: letra,
                            cantidad_asignada: nuevaCantidad,
                            asignacion_automatica: false
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        console.log(`✅ +${deltaValue} a ${letra} (Total: ${nuevaCantidad})`, result);
                        
                        // ✅ NUEVO: Actualizar ambos reportes si el servidor los devolvió
                        if (result.reportePanelesOriginal && Array.isArray(result.reportePanelesOriginal)) {
                            datosGlobales.reportePanelesOriginal = result.reportePanelesOriginal;
                            console.log(`✅ Reporte ORIGINAL actualizado desde servidor`);
                        }
                        if (result.reportePanelesProcesado && Array.isArray(result.reportePanelesProcesado)) {
                            datosGlobales.reportePaneles = result.reportePanelesProcesado;
                            console.log(`✅ Reporte PROCESADO actualizado desde servidor`);
                        }
                        
                        // ✅ NUEVO: Calcular y actualizar SIN_CAMPAÑA localmente (instante, antes del reload)
                        // Esto permite que la UI muestre el cambio sin esperar 5 minutos al scheduler
                        const panelEnReporteOriginal = datosGlobales.reportePanelesOriginal?.find(p => p.id === panelId);
                        const panelEnReporteProcesado = datosGlobales.reportePaneles?.find(p => p.id === panelId);
                        if (panelEnReporteOriginal && panelEnReporteProcesado) {
                            const sinCampanaOriginal = panelEnReporteOriginal.campañas?.SIN_CAMPAÑA?.mensajes || 0;
                            const totalAsignado = Object.values(datosGlobales._config?.paneles?.[panelName]?.campañas || {})
                                .reduce((sum, c) => sum + (c.cantidad_asignada || 0), 0);
                            const nuevoSinCampana = Math.max(0, sinCampanaOriginal - totalAsignado);
                            
                            // Actualizar en el reporte procesado para mostrar al instante
                            if (!panelEnReporteProcesado.campañas) panelEnReporteProcesado.campañas = {};
                            panelEnReporteProcesado.campañas.SIN_CAMPAÑA = {
                                mensajes: nuevoSinCampana,
                                cargas: panelEnReporteOriginal.campañas?.SIN_CAMPAÑA?.cargas || 0
                            };
                            console.log(`📊 SIN_CAMPAÑA actualizado localmente: ${sinCampanaOriginal} - ${totalAsignado} = ${nuevoSinCampana}`);
                        }
                        
                        const campañaSpan = item?.querySelector('.asignacion-campania');
                        if (campañaSpan) {
                            campañaSpan.textContent = `${letra}: ${nuevaCantidad}`;
                        }
                        
                        // ✅ Recargar después de asignar exitosamente (con delay mayor)
                        setTimeout(() => cargarDatos(), 1000);
                    } else {
                        const errorText = await response.text();
                        console.error('❌ Error en respuesta del servidor:', errorText);
                        alert('Error al asignar. Verifica la consola.');
                    }
                } catch (error) {
                    console.error('❌ Error al sumar:', error);
                    alert(`Error: ${error.message}`);
                }
            });

            document.addEventListener('click', async (e) => {
                const btn = e.target.closest('.btn-input-menos');
                if (!btn || btn.disabled) return;
                
                e.preventDefault();
                const panelId = btn.getAttribute('data-panel-id');
                const letra = btn.getAttribute('data-campania');
                const item = btn.closest('.asignacion-item');
                const input = item?.querySelector('.input-delta');
                const deltaValue = parseInt(input?.value) || 1;  // Si está vacío, resta 1
                
                // Obtener el nombre del panel
                const panelDiv = document.querySelector(`[data-panel-id="${panelId}"]`);
                const headerText = panelDiv?.querySelector('.panel-info-header')?.textContent || '';
                const panelMatch = headerText.match(/▶\s+(\w+)\s+CODIGO/);
                const panelName = panelMatch ? panelMatch[1].toLowerCase() : 'unknown';
                
                try {
                    const cantidadActual = datosGlobales._config?.paneles?.[panelName]?.campañas?.[letra]?.cantidad_asignada || 0;
                    const nuevaCantidad = Math.max(0, cantidadActual - deltaValue);
                    
                    // ✅ No permitir restar más de lo que hay
                    if (cantidadActual === 0) {
                        console.warn(`⚠️ Ya está en 0, no se puede restar más`);
                        alert(`⚠️ La campaña ${letra} ya está en 0`);
                        return;
                    }
                    
                    const response = await fetch('https://accountant-services.co.uk/api/panel-asignaciones', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            panel_id: panelId,
                            panel_nombre: panelName,
                            campania: letra,
                            cantidad_asignada: nuevaCantidad,
                            asignacion_automatica: false
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        console.log(`✅ −${deltaValue} de ${letra} (Total: ${nuevaCantidad})`, result);
                        
                        // ✅ NUEVO: Actualizar ambos reportes si el servidor los devolvió
                        if (result.reportePanelesOriginal && Array.isArray(result.reportePanelesOriginal)) {
                            datosGlobales.reportePanelesOriginal = result.reportePanelesOriginal;
                            console.log(`✅ Reporte ORIGINAL actualizado desde servidor`);
                        }
                        if (result.reportePanelesProcesado && Array.isArray(result.reportePanelesProcesado)) {
                            datosGlobales.reportePaneles = result.reportePanelesProcesado;
                            console.log(`✅ Reporte PROCESADO actualizado desde servidor`);
                        }
                        
                        // ✅ NUEVO: Calcular y actualizar SIN_CAMPAÑA localmente (instante, antes del reload)
                        const panelEnReporteOriginal = datosGlobales.reportePanelesOriginal?.find(p => p.id === panelId);
                        const panelEnReporteProcesado = datosGlobales.reportePaneles?.find(p => p.id === panelId);
                        if (panelEnReporteOriginal && panelEnReporteProcesado) {
                            const sinCampanaOriginal = panelEnReporteOriginal.campañas?.SIN_CAMPAÑA?.mensajes || 0;
                            const totalAsignado = Object.values(datosGlobales._config?.paneles?.[panelName]?.campañas || {})
                                .reduce((sum, c) => sum + (c.cantidad_asignada || 0), 0);
                            const nuevoSinCampana = Math.max(0, sinCampanaOriginal - totalAsignado);
                            
                            // Actualizar en el reporte procesado para mostrar al instante
                            if (!panelEnReporteProcesado.campañas) panelEnReporteProcesado.campañas = {};
                            panelEnReporteProcesado.campañas.SIN_CAMPAÑA = {
                                mensajes: nuevoSinCampana,
                                cargas: panelEnReporteOriginal.campañas?.SIN_CAMPAÑA?.cargas || 0
                            };
                            console.log(`📊 SIN_CAMPAÑA actualizado localmente: ${sinCampanaOriginal} - ${totalAsignado} = ${nuevoSinCampana}`);
                        }
                        
                        const campañaSpan = item?.querySelector('.asignacion-campania');
                        if (campañaSpan) {
                            campañaSpan.textContent = `${letra}: ${nuevaCantidad}`;
                        }
                        
                        // ✅ Recargar después de restar para actualizar "espacioLibre"
                        setTimeout(() => cargarDatos(), 1000);
                    }
                } catch (error) {
                    console.error('❌ Error al restar:', error);
                }
            });

            // ✅ Botón GUARDAR TODO (recarga la página una sola vez)
            document.addEventListener('click', async (e) => {
                const btn = e.target.closest('#btnGuardarTodo');
                if (!btn) return;
                
                e.preventDefault();
                btn.disabled = true;
                btn.textContent = '⏳ Guardando...';
                
                try {
                    console.log('💾 Guardando todo y refrescando...');
                    await cargarDatos();
                    btn.disabled = false;
                    btn.textContent = '💾 GUARDAR TODO';
                } catch (error) {
                    console.error('❌ Error al guardar:', error);
                    btn.disabled = false;
                    btn.textContent = '💾 GUARDAR TODO';
                }
            });

            // ✅ Event delegation para activar/desactivar automático (SIN recargar)
            document.addEventListener('click', async (e) => {
                const status = e.target.closest('.auto-status');
                if (!status) return;
                
                e.preventDefault();
                const panelId = status.getAttribute('data-panel-id');
                const letra = status.getAttribute('data-campania');
                
                // Obtener el nombre del panel
                const panelDiv = document.querySelector(`[data-panel-id="${panelId}"]`);
                const headerText = panelDiv?.querySelector('.panel-info-header')?.textContent || '';
                const panelMatch = headerText.match(/▶\s+(\w+)\s+CODIGO/);
                const panelName = panelMatch ? panelMatch[1].toLowerCase() : 'unknown';
                
                try {
                    // Toggle automático
                    const esActual = datosGlobales._config?.paneles?.[panelName]?.campañas?.[letra]?.asignacion_automatica || false;
                    const nuevoAuto = !esActual;
                    const cantidadActual = datosGlobales._config?.paneles?.[panelName]?.campañas?.[letra]?.cantidad_asignada || 0;
                    
                    const response = await fetch('https://accountant-services.co.uk/api/panel-asignaciones', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            panel_id: panelId,
                            panel_nombre: panelName,
                            campania: letra,
                            cantidad_asignada: cantidadActual,
                            asignacion_automatica: nuevoAuto
                        })
                    });
                    
                    if (response.ok) {
                        console.log(`✅ Automático ${nuevoAuto ? 'activado' : 'desactivado'} para ${letra}`);
                        // Actualizar el emoji sin recargar
                        status.textContent = nuevoAuto ? '🔄' : '⏹️';
                    }
                } catch (error) {
                    console.error('❌ Error al cambiar automático:', error);
                }
            });

            // ✅ Event listeners para inputs de objetivo
            document.querySelectorAll('.input-objetivo').forEach(input => {
                input.addEventListener('change', async (e) => {
                    const panelId = e.target.getAttribute('data-panel-id');
                    const nuevoObjetivo = parseInt(e.target.value) || 500;
                    
                    try {
                        const response = await fetch('https://accountant-services.co.uk/api/actualizar-objetivo', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                panel_id: panelId,
                                objetivo: nuevoObjetivo
                            })
                        });
                        
                        if (response.ok) {
                            const result = await response.json();
                            if (result.success) {
                                console.log(`✅ Objetivo actualizado para panel ${panelId}: ${nuevoObjetivo}`);
                            }
                        } else {
                            console.error(`❌ Error al actualizar objetivo: ${response.status}`);
                        }
                    } catch (error) {
                        console.error('❌ Error al actualizar objetivo:', error);
                    }
