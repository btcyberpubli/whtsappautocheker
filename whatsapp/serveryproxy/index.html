                });
            });
        }

        function renderizarInformePaneles() {
            if (!datosGlobales.reportePaneles || datosGlobales.reportePaneles.length === 0) {
                return '<div class="section"><p class="error">❌ No hay datos de paneles disponibles</p></div>';
            }

            let html = '<div class="section">';
            html += '<div class="section-title">📋 Informe de Paneles</div>';
            html += '<div class="panels-container">';

            const { campanas: campaniasPorPanel, usuarios: usuariosPanel } = agruparCampaniasPorPanelConUsuario();

            datosGlobales.reportePaneles.forEach(panel => {
                // ✅ NUEVO: No mostrar panel Cyber (código 0)
                if (panel.id === "0") {
                    return;
                }
                
                const campanias = campaniasPorPanel[panel.panel] || [];
                const usuarioPanel = usuariosPanel[panel.panel] || 'N/A';
                html += generarSeccionPanel(panel, campanias, usuarioPanel);
            });

            html += '</div></div>';
            return html;
        }

        /**
         * Enriquecer campañas con datos de reportePaneles
         * ✅ FIX: Evitar mapeos múltiples - cada campaña se mapea a UN ÚNICO panel
         */
        function agruparCampaniasPorPanelConUsuario() {
            const mapeo = {};
            const usuariosPanel = {};
            const campaniasMetaAds = datosGlobales.campaniasMetaAds?.datos || [];
            const campaniasMapeadas = new Set();  // Track qué campañas ya fueron mapeadas

            // Para cada usuario (cuenta de Meta Ads)
            campaniasMetaAds.forEach(usuario => {
                const nombreUsuario = usuario.nombre;
                
                // Para cada cuenta del usuario
                usuario.cuentas?.forEach(cuenta => {
                    // Para cada campaña en la cuenta
                    cuenta.campanias?.forEach(campania => {
                        // ✅ NOVO: Si ya fue mapeada, saltar
                        const campaniaId = `${campania.id}`;
                        if (campaniasMapeadas.has(campaniaId)) {
                            return;
                        }

                        const campaniaName = campania.nombre.toLowerCase().trim();
                        const userName = nombreUsuario.toLowerCase().trim();

                        // ✅ PASO 1: Buscar si la campaña contiene EXPLÍCITAMENTE un nombre de panel
                        let panelPorNombre = null;
                        datosGlobales.reportePaneles?.forEach(panel => {
                            const panelName = panel.panel.toLowerCase().trim();
                            // Buscar si el panel name está en la campaña (prioritario)
                            if (campaniaName.includes(panelName) && (!panelPorNombre || panelName.length > panelPorNombre.panel.toLowerCase().length)) {
                                panelPorNombre = panel;
                            }
                        });

                        let campaniaEncontrada = false;
                        
                        // ✅ PASO 2: Si encontramos panel por nombre, mapear SOLO a ese
                        // NO hacer match por usuario si ya hay un panel explícito
                        if (panelPorNombre) {
                            campaniaEncontrada = true;
                            campaniasMapeadas.add(campaniaId);
                            
                            const panel = panelPorNombre;
                            if (!mapeo[panel.panel]) {
                                mapeo[panel.panel] = [];
                                usuariosPanel[panel.panel] = nombreUsuario;
                            }
                            
                            // Buscar datos de cargas
                            let clyParaCampania = 0;
                            let cargasParaCampania = 0;
                            const letraMatch = campaniaName.match(/-([a-z])-/i);
                            if (letraMatch && letraMatch[1]) {
                                const letraBuscada = letraMatch[1].toUpperCase();
                                if (panel.campañas && panel.campañas[letraBuscada]) {
                                    const datosLetra = panel.campañas[letraBuscada];
                                    clyParaCampania = datosLetra.mensajes || 0;
                                    cargasParaCampania = datosLetra.cargas || 0;
                                }
                            }
                            
                            mapeo[panel.panel].push({
                                ...campania,
                                usuario: nombreUsuario,
                                cly_para_campania: clyParaCampania,
                                cargas_para_campania: cargasParaCampania
                            });
                        } 
                        // ✅ PASO 3: Si NO hay panel explícito, intentar match por usuario
                        else {
                            datosGlobales.reportePaneles?.forEach(panel => {
                                if (campaniaEncontrada) return;
                                
                                const panelName = panel.panel.toLowerCase().trim();
                                // Solo match por usuario si el usuario name es largo y específico
                                if (userName.length >= 4 && campaniaName.includes(userName)) {
                                    campaniaEncontrada = true;
                                    campaniasMapeadas.add(campaniaId);
                                    
                                    if (!mapeo[panel.panel]) {
                                        mapeo[panel.panel] = [];
                                        usuariosPanel[panel.panel] = nombreUsuario;
                                    }
                                    
                                    let clyParaCampania = 0;
                                    let cargasParaCampania = 0;
                                    const letraMatch = campaniaName.match(/-([a-z])-/i);
                                    if (letraMatch && letraMatch[1]) {
                                        const letraBuscada = letraMatch[1].toUpperCase();
                                        if (panel.campañas && panel.campañas[letraBuscada]) {
                                            const datosLetra = panel.campañas[letraBuscada];
                                            clyParaCampania = datosLetra.mensajes || 0;
                                            cargasParaCampania = datosLetra.cargas || 0;
                                        }
                                    }
                                    
                                    mapeo[panel.panel].push({
                                        ...campania,
                                        usuario: nombreUsuario,
                                        cly_para_campania: clyParaCampania,
                                        cargas_para_campania: cargasParaCampania
                                    });
                                }
                            });
                        }
                        
                        // Si no se encontró en ningún panel y tiene gasto, registrar
                        if (!campaniaEncontrada && (campania.metricas_diarias?.spend || 0) > 0) {
                            console.warn(`⚠️ Campaña sin panel asignado: ${campania.nombre}`);
                        }
                    });
                });
            });

            return { campanas: mapeo, usuarios: usuariosPanel };
        }

        function generarSeccionPanel(panel, campanias, usuarioPanel) {
            let html = `<div class="panel-section" data-panel-id="${panel.id}">`;
            
            html += '<div class="panel-info">';

            // ✅ Obtener objetivo de la configuración
            const sinCampana = panel.campañas?.SIN_CAMPAÑA?.mensajes || 0;
            const panelNorm = normalizarNombre(panel.panel);
            const configPanel = datosGlobales._config?.paneles?.[panelNorm];
            
            // 🔍 DEBUG
            if (!configPanel) {
                console.warn(`⚠️ No encontré config para panel "${panel.panel}" (normalizado: "${panelNorm}")`);
                console.log(`Paneles disponibles:`, Object.keys(datosGlobales._config?.paneles || {}));
            }
            
            const objetivoActual = configPanel?.objetivo || 500;
            
            // Calcular total CLY para este panel (incluyendo sin campaña)
            const totalClvPanel = campanias.reduce((sum, camp) => sum + (camp.cly_para_campania || 0), 0) + sinCampana;
            
            // 📊 Una sola línea con FB, Objetivo y Cargas

                <span class="panel-info-value">${usuarioPanel}</span>

                    ${panel.total_mensajes_hoy}/<input type="number" class="input-objetivo" data-panel-id="${panel.id}" value="${objetivoActual}" min="1" max="10000" style="width: 50px; padding: 2px 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 12px;">
                </span>
                <span class="panel-info-label">Cargas</span>
                <span class="panel-info-value">${totalClvPanel > 0 ? Math.round((panel.cargas_hoy / totalClvPanel) * 100) : 0}%</span>
            </div>`;
            
            // Obtener asignaciones del config
            let asignacionesHtml = '';

            if (configPanel?.campañas && campanias.length > 0) {
              const sinCampanaDisponibles = panel.campañas?.SIN_CAMPAÑA?.mensajes || 0;
              
              asignacionesHtml = '<div class="asignaciones-list">';
              
              // ✅ Mostrar TODAS las campañas (no solo las con asignación > 0)
              campanias.forEach(campania => {

                const letra = letraMatch ? letraMatch[1].toUpperCase() : 'X';

                const autoStatus = configPanel.campañas?.[letra]?.asignacion_automatica ? '🔄' : '⏹️';
                
                // Determinar si puedo agregar (+1 habilitado si hay disponibles)
                const puedoAgregar = sinCampanaDisponibles > 0;

                totalAsignados += cantidadActual;
                
                asignacionesHtml += `
                  <div class="asignacion-item">

                    <div class="asignacion-input-delta">

                      <input type="number" class="input-delta" data-campania="${letra}" value="1" min="0" max="100">
                      <button class="btn-input-mas" data-panel-id="${panel.id}" data-campania="${letra}">+</button>

                    <span class="asignacion-campania"><strong>${letra}</strong>: ${cantidadActual}</span>

                    <button class="btn-resetear-asignacion" data-panel-id="${panel.id}" data-campania="${letra}" title="Eliminar todo" style="background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px 4px; color: #e74c3c;">🗑️</button>
                  </div>
                `;
              });
              
              asignacionesHtml += '<div class="asignaciones-footer"><button class="btn-guardar-todo" id="btnGuardarTodo">💾 GUARDAR TODO</button></div>';
              asignacionesHtml += '</div>';

            // Mostrar asignaciones si existen
            if (asignacionesHtml) {

            // Mostrar alerta de "Sin campaña" si hay mensajes sin campaña (DENTRO del panel-info, después de asignados)
            if (sinCampana > 0) {

              </div>`;

            html += '</div>';

            html += '<div>';
            // Filtrar campañas: solo con gasto > 0 Y que estén mapeadas a un panel
            const campaniasFiltradas = campanias.filter(c => {
                const gasto = parseFloat(c.metricas_diarias?.spend || 0);
                // Validar que la campaña esté mapeada (tiene usuario)
                return gasto > 0 && c.usuario;
            });
            
            if (campaniasFiltradas.length > 0) {
                html += '<div class="campaigns-list">';
                
                // Calcular totales SOLO de campañas filtradas

                let totalClv = 0;
                
                campaniasFiltradas.forEach(campania => {
                    html += generarBarraCampania(campania);
                    totalAds += campania.metricas_diarias?.messages || 0;
                    totalClv += campania.cly_para_campania || 0;
                });
                
                // Agregar los mensajes sin campaña al total CLY
                totalClv += sinCampana;
                
                html += '</div>';
                
                // ✅ NUEVO: Mostrar Total CLY con comparación al objetivo
                const porcentajeAlcanzado = objetivoActual > 0 ? Math.round((totalClv / objetivoActual) * 100) : 0;
                const claseProgreso = porcentajeAlcanzado >= 100 ? 'progreso-completo' :

                                     porcentajeAlcanzado >= 25 ? 'progreso-bajo' :
                                     'progreso-inicial';
                const icono = totalClv >= objetivoActual ? '✅' : '📊';
                
                html += `<div class="totales-cargas ${claseProgreso}">
                    ${icono} <span class="totales-label">Total CLY</span>: <span class="totales-valor">${totalClv}/${objetivoActual}</span>
                    <span class="totales-porcentaje">(${porcentajeAlcanzado}%)</span>
                </div>`;

                const porcentajeSinCampanias = objetivoActual > 0 ? Math.round((totalClvSinCampanias / objetivoActual) * 100) : 0;
                const claseProgresoSinCampanias = porcentajeSinCampanias >= 100 ? 'progreso-completo' : 
                                                   porcentajeSinCampanias >= 75 ? 'progreso-alto' :
                                                   porcentajeSinCampanias >= 50 ? 'progreso-medio' :
                                                   porcentajeSinCampanias >= 25 ? 'progreso-bajo' :
                                                   'progreso-inicial';
                html += `<div class="totales-cargas ${claseProgresoSinCampanias}">
                    📊 <span class="totales-label">Total CLY</span>: <span class="totales-valor">${totalClvSinCampanias}/${objetivoActual}</span>
                    <span class="totales-porcentaje">(${porcentajeSinCampanias}%)</span>
                </div>`;
            }

            html += '</div>';

            html += '</div>';
            return html;
        }

        /**
         * Obtener clase de fondo suave para campaña basada en rango
         * Verde: < $0.50
         * Amarillo: $0.50 - $0.99
         * Naranja: $1.00 - $1.49
         * Rojo: >= $1.50
         */
        function getBackgroundClassForPrice(precio) {
            const precioNum = parseFloat(precio || 0);
            
            if (precioNum < 0.50) {
                return 'campania-fondo-verde';
            } else if (precioNum < 1.00) {
                return 'campania-fondo-amarillo';
            } else if (precioNum < 1.50) {
                return 'campania-fondo-naranja';
            } else {
                return 'campania-fondo-rojo';
            }
        }

        /**
         * Obtener clase CSS para precio CPM basada en rango
         * Verde: < $0.50
         * Amarillo: $0.50 - $0.99
         * Naranja: $1.00 - $1.49
         * Rojo: >= $1.50
         */
        function getColorClassForPrice(precio) {
            const precioNum = parseFloat(precio || 0);
            
            if (precioNum < 0.50) {
                return 'precio-verde';
            } else if (precioNum < 1.00) {
                return 'precio-amarillo';
            } else if (precioNum < 1.50) {
                return 'precio-naranja';
            } else {
                return 'precio-rojo';
            }
        }

        /**
         * Generar barra de campaña con datos correctos + adsets
         */
        function generarBarraCampania(campania) {
            const metricas = campania.metricas_diarias || {};
            const estado = campania.estado === 'ACTIVE' ? 'Activa' : 'Pausada';
            const gasto = parseFloat(metricas.spend || 0);
            const gastoStr = gasto.toFixed(2);
            
            // ADS = metricas_diarias.messages (de Meta Ads)
            const ads = metricas.messages || 0;
            // CLY = reportePaneles.campañas[LETRA].mensajes
            const clv = campania.cly_para_campania || 0;
            // Cargas = reportePaneles.campañas[LETRA].cargas
            const cargas = campania.cargas_para_campania || 0;
            
            // Costo por mensaje = gasto / CLY (NO sobre Ads)
            const costoPorMensaje = clv > 0 ? gasto / clv : 0;
            const costoPorMensajeStr = costoPorMensaje.toFixed(2);

            const colorClass = getColorClassForPrice(costoPorMensaje);
            const bgClass = getBackgroundClassForPrice(costoPorMensaje);

            // ✅ Determinar si está pausada
            const isPaused = campania.estado !== 'ACTIVE';
            const pausedClass = isPaused ? 'campaign-bar-paused' : '';

            // ✅ Extraer letra de campaña del nombre
            const letraMatch = campania.nombre.match(/-([a-z])-/i);
            const letra = letraMatch ? letraMatch[1].toUpperCase() : 'X';

            // 🎯 Generar HTML de adsets si existen
            let adsetsHtml = '';
            let adsetsButtonHtml = '';
            if (Array.isArray(campania.adsets) && campania.adsets.length > 0) {
                const adsetsId = `adsets-${campania.id || letra}-${Date.now()}`;
                let adsetsContent = '';
                campania.adsets.forEach(adset => {
                    const adsetNombre = adset.adset_name || adset.nombre || 'Sin nombre';
                    const adsetStatus = (adset.status || 'ACTIVE').toUpperCase();
                    const adsetResultados = adset.resultados || adset.metrics?.results || 0;
                    const adsetCosto = adset.costoPorResultado || 0;
                    const statusClass = adsetStatus === 'ACTIVE' ? 'active' : 'paused';
                    
                    adsetsContent += `
                        <div class="campaign-adset-row">
                            <span class="adset-name">${adsetNombre}</span>
                            <div class="adset-stat">
                                <span class="adset-stat-label">Resultados</span>
                                <span class="adset-stat-value">${adsetResultados}</span>
                            </div>
                            <div class="adset-stat">
                                <span class="adset-stat-label">Costo/Res</span>
                                <span class="adset-stat-value">$${adsetCosto.toFixed(2)}</span>
                            </div>
                            <span class="adset-status ${statusClass}">${adsetStatus === 'ACTIVE' ? '✓ Activo' : '⏸ Pausado'}</span>
                        </div>
                    `;
                });
                
                // Botón para incluir en campaign-bar-stats
                adsetsButtonHtml = `
                    <div class="campaign-stat-item">
                        <button class="adsets-toggle" onclick="toggleCollapse('${adsetsId}')" title="Ver / Ocultar adsets">▶ ${campania.adsets.length}</button>
                    </div>
                `;
                
                // Contenido desplegable que va debajo de la barra
                adsetsHtml = `
                    <div id="${adsetsId}" class="collapse-content collapsed campaign-adsets-container">
                        ${adsetsContent}
                    </div>
                `;
            }

            return `
                <div class="campaign-bar ${bgClass} ${pausedClass}">
                    <span class="campaign-bar-name">${campania.nombre}</span>
                    <div class="campaign-bar-stats">
                        <div class="campaign-stat-item">
                            <span class="campaign-stat-label">Gasto</span>
                            <span class="campaign-stat-value">$${gastoStr}</span>
                        </div>
                        <div class="campaign-stat-item">
                            <span class="campaign-stat-label">Ads</span>
                            <span class="campaign-stat-value">${ads}</span>
                        </div>
                        <div class="campaign-stat-item">
                            <span class="campaign-stat-label">CLY</span>
                            <span class="campaign-stat-value">${clv}</span>
                        </div>
                        <div class="campaign-stat-item ${colorClass}">
                            <span class="campaign-stat-label">$</span>
                            <span class="campaign-stat-value">$${costoPorMensajeStr}</span>
                        </div>
                        <div class="campaign-stat-item">
                            <span class="campaign-stat-label">Cargas</span>
                            <span class="campaign-stat-value">${cargas}</span>
                        </div>
                        <div class="campaign-stat-item">
                            <span class="campaign-stat-label">Estado</span>
                            <span class="campaign-stat-value ${estado === 'Activa' ? 'estado-activo' : 'estado-pausado'}">${estado}</span>
                        </div>
                        <div class="campaign-stat-item">
                            <button class="btn-creativo" onclick="abrirModalCreativo(${JSON.stringify(campania).replace(/"/g, '&quot;')})">👁️ Ver Creativo</button>
                        </div>
                        ${adsetsButtonHtml}
                    </div>
                </div>
                ${adsetsHtml}
            `;
        }

        function renderizarTablaSaldos() {
            if (!datosGlobales.reportePaneles || !datosGlobales.campaniasMetaAds?.datos) {
                return '';
            }

            // Obtener mapeo de usuarios por panel
            const { usuarios: usuariosPanel } = agruparCampaniasPorPanelConUsuario();
            
            // Crear mapa de saldos por usuario
            // Saldo real = spend_cap - amount_spent (convertido de centavos)
            const saldosMap = {};
            datosGlobales.campaniasMetaAds.datos.forEach(usuario => {
                const nombreNorm = normalizarNombre(usuario.nombre);
                saldosMap[nombreNorm] = 0;
                
                usuario.cuentas?.forEach(cuenta => {
                    const spendCap = parseFloat(cuenta.saldos?.spend_cap) || 0;
                    const amountSpent = parseFloat(cuenta.saldos?.amount_spent) || 0;
                    const saldoReal = (spendCap - amountSpent) / 100;
                    saldosMap[nombreNorm] += saldoReal;
                });
            });

            let htmlTabla = '<div class="section saldos-section">';
            htmlTabla += '<div class="section-title">💰 FB - ZOCKET Saldos actuales</div>';
            htmlTabla += '<table class="saldos-table">';
            htmlTabla += `
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Saldo Actual</th>
                    </tr>
                </thead>
                <tbody>
            `;

            let totalSaldo = 0;

            // ITERAR POR USUARIOS (no por paneles) - incluye todos: con campañas y sin campañas
            datosGlobales.campaniasMetaAds.datos.forEach(usuario => {
                const nombreNorm = normalizarNombre(usuario.nombre);
                const saldo = saldosMap[nombreNorm] || 0;
                
                totalSaldo += saldo;

                htmlTabla += `
                    <tr>
                        <td class="usuario-name"><strong>${usuario.nombre}</strong></td>
                        <td class="saldo-cell">${formatearMoneda(saldo)}</td>
                    </tr>
                `;
            });

            htmlTabla += `
                <tr class="total-row">
                    <td>TOTAL SALDO</td>
                    <td>${formatearMoneda(totalSaldo)}</td>
                </tr>
            `;

            htmlTabla += `
                    </tbody>
                </table>
            </div>`;

            return htmlTabla;
        }

        async function exportarPNG() {
            const exportBtn = document.getElementById('exportBtn');
            exportBtn.disabled = true;
            exportBtn.textContent = '📥 Generando...';

            try {
                // ✅ Cerrar todos los desplegables antes de descargar
                const allCollapsibles = document.querySelectorAll('[id^="toggle-asignaciones-"]');
                allCollapsibles.forEach(el => {
                    if (!el.classList.contains('collapsed')) {
                        // Si está abierto, cerrarlo
                        const panelIdUnique = el.id;
                        toggleCollapse(panelIdUnique);
                    }
                });

                // Pequeño delay para que el DOM se actualice
                await new Promise(resolve => setTimeout(resolve, 200));

                const element = document.getElementById('content');
                const canvas = await html2canvas(element, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false
                });

                const link = document.createElement('a');
                const fecha = new Date().toLocaleString('es-AR').replace(/[/:,]/g, '-');
                link.href = canvas.toDataURL('image/png');
                link.download = `informe-campanas-${fecha}.png`;
                link.click();

                const successMsg = document.getElementById('successMsg');
                successMsg.textContent = '✅ Informe descargado correctamente';
                successMsg.classList.add('show');

                setTimeout(() => {
                    successMsg.classList.remove('show');
                }, 3000);

            } catch (error) {
                console.error('Error al exportar:', error);
                alert('❌ Error al descargar el informe');
            } finally {
                exportBtn.disabled = false;
                exportBtn.textContent = '📥 Descargar PNG';
                
                // ✅ Reabre todos los desplegables después de descargar
                const allCollapsibles = document.querySelectorAll('[id^="toggle-asignaciones-"]');
                allCollapsibles.forEach(el => {
                    if (el.classList.contains('collapsed')) {
                        // Si está cerrado, reabrirlo
                        const panelIdUnique = el.id;
                        toggleCollapse(panelIdUnique);
                    }
                });
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            cargarDatos();

        });

        // ========== FUNCIONES DE ASIGNACIÓN DE MENSAJES ==========

        /**
         * Toggle para desplegables
         */
        function toggleCollapse(elementId) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            // Toggle la clase collapsed
            element.classList.toggle('collapsed');
            
            // Encontrar el botón más cercano y cambiar su flecha
            const btn = element.parentElement?.querySelector('.collapse-toggle, .adsets-toggle');
            if (btn && btn.textContent.includes('▶')) {
                btn.textContent = btn.textContent.replace('▶', '▼');
            } else if (btn && btn.textContent.includes('▼')) {
                btn.textContent = btn.textContent.replace('▼', '▶');
            }
        }

        /**
         * Guardar asignaciones de un panel específico
         */
        async function guardarAsignacionesPanel(panelId, panelNombre) {
            try {
                // Buscar todos los inputs de asignación para este panel
                const panelDiv = document.querySelector(`[data-panel-id="${panelId}"]`);
                if (!panelDiv) {
                    console.error('❌ Panel no encontrado');
                    return;
                }

                const inputs = panelDiv.querySelectorAll('.input-asignar-mensaje');
                if (inputs.length === 0) {
                    console.warn('⚠️ No hay campañas para asignar');
                    return;
                }

                // ✅ VALIDACIÓN: Obtener mensajes disponibles (sin campaña)
                const panelData = datosGlobales.reportePaneles?.find(p => p.id === panelId);
                const sinCampanaDisponibles = panelData?.campañas?.SIN_CAMPAÑA?.mensajes || 0;
                
                // Construir estructura de campañas desde los inputs (MODO ACUMULATIVO)
                // ⭐ IMPORTANTE: Enviar TODAS las campañas, no solo las que cambiaron
                const campañas = {};
                let hayAsignaciones = false;
                let totalNuevoAsignado = 0;  // Para validar que no sobrepase sin_campaña
                
                inputs.forEach(input => {
                    const delta = parseInt(input.value) || 0;  // Delta = cuánto SUMAR/RESTAR
                    const letra = input.getAttribute('data-campania');
                    
                    if (letra) {
                        // Obtener cantidad actual del config
                        const cantidadActual = datosGlobales._config?.paneles?.[panelNombre]?.campañas?.[letra]?.cantidad_asignada || 0;
                        const nuevaCantidad = Math.max(0, cantidadActual + delta);  // No permitir negativos
                        
                        // Incluir TODAS las campañas, aunque no cambien
                        campañas[letra] = {
                            cantidad_asignada: nuevaCantidad,
                            asignacion_automatica: false
                        };
                        
                        totalNuevoAsignado += nuevaCantidad;  // Sumar para validación
                        
                        // Solo marcar como cambio si el delta no es 0
                        if (delta !== 0) {
                            hayAsignaciones = true;
                            console.log(`📝 ${letra}: ${cantidadActual} + ${delta} = ${nuevaCantidad}`);
                        } else {
                            console.log(`📝 ${letra}: ${cantidadActual} (sin cambios)`);
                        }
                    }
                });

                // Si no hay asignaciones con cambios, no enviar
                if (!hayAsignaciones) {
                    console.log('ℹ️ Sin cambios para guardar');
                    return;
                }

                // ✅ VALIDACIÓN: Verificar que no sobrepase sin_campaña
                if (totalNuevoAsignado > sinCampanaDisponibles) {
                    const exceso = totalNuevoAsignado - sinCampanaDisponibles;
                    const errorMsg = document.getElementById('successMsg');
                    errorMsg.textContent = `❌ No hay suficientes mensajes. Disponibles: ${sinCampanaDisponibles} | Intentas asignar: ${totalNuevoAsignado} (exceso: ${exceso})`;
                    errorMsg.style.background = '#e74c3c';
                    errorMsg.classList.add('show');
                    
                    setTimeout(() => {
                        errorMsg.classList.remove('show');
                        errorMsg.style.background = '';
                    }, 4000);
                    
                    console.warn(`⚠️ SOBRESASIGNACIÓN: ${totalNuevoAsignado} > ${sinCampanaDisponibles}`);
                    return;
                }

                console.log(`💾 Guardando asignaciones para ${panelNombre}...`, campañas);
                console.log(`✅ Validación OK: ${totalNuevoAsignado} asignados de ${sinCampanaDisponibles} disponibles`);

                // Enviar al servidor CON TODAS LAS CAMPAÑAS
                const response = await fetch('https://accountant-services.co.uk/api/panel-asignaciones', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        panel: panelNombre,
                        campañas: campañas
                    })
                });

                const resultado = await response.json();

                if (!response.ok) {
                    throw new Error(resultado.error || 'Error al guardar asignaciones');
                }

                // Mostrar éxito
                const successMsg = document.getElementById('successMsg');
                successMsg.textContent = `✅ Asignaciones guardadas para ${panelNombre}`;
                successMsg.style.background = '';
                successMsg.classList.add('show');

                // Limpiar inputs y recargar
                setTimeout(() => {
                    successMsg.classList.remove('show');
                    inputs.forEach(input => input.value = '0');
                    cargarDatos();
                }, 1500);

            } catch (error) {
                console.error('Error:', error);
                alert(`❌ Error: ${error.message}`);
            }
        }
    </script>

    <!-- MODAL CREATIVO -->
    <div id="modalCreativo" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Creativo de la Campaña</h2>
                <button class="modal-close-btn" onclick="cerrarModalCreativo()">&times;</button>
            </div>
            <img id="modalImage" class="modal-image" src="" alt="Creativo">
            <div class="modal-info">
                <div class="modal-info-row">
                    <span class="modal-info-label">Campaña:</span>
                    <span id="modalCampanaName">-</span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">Gasto:</span>
                    <span id="modalGasto">-</span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">Ads:</span>
                    <span id="modalAds">-</span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">CLY:</span>
                    <span id="modalCLY">-</span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">Costo por Mensaje:</span>
                    <span id="modalCosto">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ✅ NUEVO: Funciones para Alertas de WhatsApp
        async function cargarAlertasWhatsApp() {
            try {
                // 🔄 Intenta desde HTTPS primero (VPS), si no desde localhost
                let allItems = [];
                
                try {
                    const response = await fetch('https://accountant-services.co.uk/api/whatsapp-alerts');
                    if (!response.ok) throw new Error('Fallo VPS');
                    const data = await response.json();
                    // ✅ El servidor devuelve: {success, count, alerts, activeCount}
                    allItems = Array.isArray(data) ? data : (data.alerts || []);
                    console.log('✅ Alertas cargadas desde VPS:', allItems.length);
                } catch (vpsError) {
                    console.warn('⚠️ VPS no disponible, intentando localhost...');
                    try {
                        const response = await fetch('http://localhost:3010/api/whatsapp-alerts');
                        if (!response.ok) throw new Error('Fallo localhost');
                        const data = await response.json();
                        // ✅ El servidor devuelve: {success, count, alerts, activeCount}
                        allItems = Array.isArray(data) ? data : (data.alerts || []);
                        console.log('✅ Alertas cargadas desde localhost:', allItems.length);
                    } catch (localError) {
                        console.warn('⚠️ Localhost tampoco disponible');
                        return;
                    }
                }

                // Separar alertas (caídas) de confirmaciones (líneas bien controladas)
                const alertas = Array.isArray(allItems) ? allItems.filter(item => item.type === 'whatsapp-downline' || !item.type) : [];
                const confirmaciones = Array.isArray(allItems) ? allItems.filter(item => item.type === 'whatsapp-cycle-ok') : [];

                const activeAlerts = alertas.filter(a => a.status === 'active' || !a.status);

                // Mostrar/ocultar sección según si hay alertas O confirmaciones recientes
                const section = document.getElementById('whatsappAlertsSection');
                const listDiv = document.getElementById('whatsappAlertsList');
                const badge = document.getElementById('alertsCount');

                if (activeAlerts.length === 0 && confirmaciones.length === 0) {
                    section.style.display = 'none';
                    return;
                }

                section.style.display = 'block';
                badge.textContent = activeAlerts.length > 0 ? activeAlerts.length : '✓';

                // Renderizar alertas y confirmaciones
                let html = '';

                // 🔴 SECCIÓN 1: Alertas de caídas (lo importante)
                if (activeAlerts.length > 0) {
                    html += '<div class="whatsapp-subsection" style="margin-bottom: 16px;">';
                    html += `<div style="font-size: 12px; font-weight: 700; color: #e74c3c; margin-bottom: 8px;">🔴 LÍNEAS SIN RESPUESTA (${activeAlerts.length})</div>`;
                    activeAlerts.forEach((alert) => {
                        const timeAgo = getTimeAgo(new Date(alert.detectedAt || alert.receivedAt));
                        html += `
                            <div class="whatsapp-alert-item">
                                <div class="whatsapp-alert-content">
                                    <div class="whatsapp-alert-contact">
                                        📱 ${alert.contactName}
                                    </div>
                                    <div class="whatsapp-alert-message">
                                        "${alert.lastMessage || 'Sin mensaje registrado'}"
                                    </div>
                                    <div class="whatsapp-alert-time">
                                        Detectada hace ${timeAgo}
                                    </div>
                                </div>
                                <div class="whatsapp-alert-actions">
                                    <button class="btn-resolve-alert" onclick="resolverAlerta('${alert.id}')">
                                        ✓ Resolver
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                // ✅ SECCIÓN 2: Confirmaciones de ciclos completados exitosamente
                if (confirmaciones.length > 0) {
                    const ultimasConfirmaciones = confirmaciones.slice(-1).reverse();
                    html += '<div class="whatsapp-subsection">';
                    ultimasConfirmaciones.forEach((conf) => {
                        const fecha = new Date(conf.detectedAt || conf.receivedAt);
                        const horaFormato = fecha.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
                        html += `
                            <div style="background: rgba(39, 174, 96, 0.15); border-left: 2px solid #27ae60; padding: 4px 6px; border-radius: 3px; font-size: 10px; color: #27ae60; display: flex; justify-content: space-between; align-items: center;">
                                <span>✅ Último ciclo: ${conf.contactName}</span>
                                <span style="font-weight: 600;">🕐 ${horaFormato}</span>
                            </div>
                        `;
                    });
                    html += '</div>';
                }

                listDiv.innerHTML = html;
                console.log(`✅ Alertas WhatsApp cargadas: ${activeAlerts.length} caídas, ${confirmaciones.length} controladas`);

            } catch (error) {
                console.error('❌ Error cargando alertas de WhatsApp:', error);
            }
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            
            if (seconds < 60) return `${seconds}s`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
            return `${Math.floor(seconds / 86400)}d`;
        }

        async function resolverAlerta(alertId) {
            try {
                const response = await fetch(`https://accountant-services.co.uk/api/whatsapp-alert/${alertId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'resolved' })
                });

                const data = await response.json();
                if (data.success) {
                    console.log(`✅ Alerta resuelta: ${alertId}`);
                    cargarAlertasWhatsApp(); // Recargar alertas
                } else {
                    alert('❌ Error al resolver la alerta');
                }
            } catch (error) {
                console.error('❌ Error resolviendo alerta:', error);
                alert('Error al resolver la alerta');
            }
        }

        // Cargar alertas inicialmente y cada 15 segundos
        cargarAlertasWhatsApp();
        setInterval(cargarAlertasWhatsApp, 15000);

        function abrirModalCreativo(campania) {
            const imagenUrl = campania.imagenes?.image_url || campania.imagenes?.thumbnail_url || '';
            
            if (!imagenUrl) {
                alert('⚠️ No hay imagen disponible para esta campaña');
                return;
            }

            const gasto = parseFloat(campania.metricas_diarias?.spend || 0);
            const ads = campania.metricas_diarias?.messages || 0;
            const clv = campania.cly_para_campania || 0;
            const costoPorMensaje = clv > 0 ? (gasto / clv).toFixed(4) : 0;

            document.getElementById('modalImage').src = imagenUrl;
            document.getElementById('modalCampanaName').textContent = campania.nombre;
            document.getElementById('modalGasto').textContent = '$' + gasto.toFixed(2);
            document.getElementById('modalAds').textContent = ads;
            document.getElementById('modalCLY').textContent = clv;
            document.getElementById('modalCosto').textContent = '$' + costoPorMensaje;

            document.getElementById('modalCreativo').classList.add('active');
        }

        function cerrarModalCreativo() {
            document.getElementById('modalCreativo').classList.remove('active');
        }

        // Cerrar modal al hacer click fuera
        document.getElementById('modalCreativo').addEventListener('click', (e) => {
            if (e.target.id === 'modalCreativo') {
                cerrarModalCreativo();
            }
        });

        // Cerrar modal con tecla ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                cerrarModalCreativo();
            }
        });

        // Dark Mode Toggle
        function toggleDarkMode() {
            const body = document.body;
            const isDarkMode = body.classList.toggle('dark-mode');
            
            // Guardar preferencia en localStorage
            localStorage.setItem('darkMode', isDarkMode);
            
            // Actualizar botón
            const btn = document.getElementById('darkModeBtn');
            if (btn) {
                btn.textContent = isDarkMode ? '☀️' : '🌙';
            }
        }

        // Cargar preferencia de dark mode al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            const darkModeEnabled = localStorage.getItem('darkMode') === 'true';
            if (darkModeEnabled) {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('darkModeBtn');
                if (btn) btn.textContent = '☀️';
            }
        });

        // También ejecutar si el DOM ya está listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                const darkModeEnabled = localStorage.getItem('darkMode') === 'true';
                if (darkModeEnabled) {
                    document.body.classList.add('dark-mode');
                    const btn = document.getElementById('darkModeBtn');
                    if (btn) btn.textContent = '☀️';
                }
            });
        } else {
            const darkModeEnabled = localStorage.getItem('darkMode') === 'true';
            if (darkModeEnabled) {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('darkModeBtn');
                if (btn) btn.textContent = '☀️';
            }
        }
    </script>
